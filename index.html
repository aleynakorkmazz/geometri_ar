<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Matematik AR Dünyası</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      .version-tag { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.5); color: white; padding: 5px 12px; font-family: sans-serif; font-size: 14px; border-radius: 20px; z-index: 9999; }
    </style>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    <div class="version-tag">v1.0.3 - Debug Modu</div>

    <a-scene embedded arjs='sourceType: webcam; debugUIEnabled: true; patternRatio: 0.75;'>

      <a-marker type="pattern" url="./isaretciler/daire.patt">
        <a-sphere position="0 0.5 0" radius="0.5" color="#2E3192"></a-sphere>
      </a-marker>

      <a-marker type="pattern" url="./isaretciler/kare.patt">
        <a-box position="0 0.5 0" color="#39B54A"></a-box>
      </a-marker>

      <a-marker type="pattern" url="./isaretciler/ucgen.patt">
        <a-cylinder position="0 0.5 0" segments-radial="3" rotation="0 45 0" color="#EC008C"></a-cylinder>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
